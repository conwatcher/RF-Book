<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>{{ page.title }} | {{ site.title }}</title>
    <meta name="description" content="{{ page.description | default: site.description | escape }}" />
    <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}" />
    {% seo %}
  </head>
  <body class="{{ page.body_class | default: 'page' }}">
    {% include header.html %}
    <main class="main">
      {{ content }}
    </main>
    {% include newsletter_block.html %}
    {% include footer.html %}
    <script src="{{ '/assets/js/site.js' | relative_url }}"></script>
  </body>
</html>
