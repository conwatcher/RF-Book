<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RF Book</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css"
        integrity="sha384-DyZvAKXQglGmG2qCscyiOJpPso1HmSbI9O1mTMRN7dbtIj9CYrGlLdMCtT/EwJwP" crossorigin="anonymous">
</head>
<body>
    <header>
        <div class="hero">
            <h1>Welcome to the RF Book</h1>
            <p>Your complete guide to RF technology</p>
            <button>Start Learning</button>
        </div>
    </header>
    <main>
        <section id="features">
            <h2>Features</h2>
            <!-- Jekyll placeholders -->
            {% for feature in site.data.features %}
            <div class="feature">
                <h3>{{ feature.title }}</h3>
                <p>{{ feature.description }}</p>
            </div>
            {% endfor %}
        </section>
    </main>
    <footer>
        <p>&copy; 2026 RF Book. All Rights Reserved.</p>
    </footer>
</body>
</html>
